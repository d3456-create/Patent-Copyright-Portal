<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santosh University — Patent &amp; Copyright Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --cream:#f2ece0;
    --cream-dark:#ece3d2;
    --navy:#1a2744;
    --navy-light:#26365c;
    --maroon:#a02838;
    --maroon-dark:#841f2d;
    --white:#fffdf9;
    --border:#e3dbcb;
    --text-dark:#241f17;
    --text-gray:#6b6457;
    --blue:#2563a8;
    --amber:#c8780f;
    --green:#15803d;
    --red:#b91c1c;
    --shadow: 0 1px 3px rgba(26,39,68,0.08), 0 1px 2px rgba(26,39,68,0.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: Georgia, 'Times New Roman', serif;
    background:var(--cream);
    color:var(--text-dark);
  }
  .sans{ font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }

  /* ---------- HEADER ---------- */
  header.topbar{
    background:var(--navy);
    color:#fff;
    border-bottom:3px solid var(--maroon);
  }
  .topbar-inner{
    max-width:1180px;
    margin:0 auto;
    padding:16px 24px 0 24px;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand-mark{ width:48px; height:48px; border-radius:8px; overflow:hidden; display:flex; align-items:center; justify-content:center; background:#fff; }
  .brand-mark img{ width:100%; height:100%; object-fit:contain; }
  .brand-text h1{ margin:0; font-size:21px; line-height:1.2; }
  .brand-text p{ margin:2px 0 0 0; font-size:11.5px; letter-spacing:.04em; text-transform:uppercase; color:#b9c0d4; font-family:inherit;}
  .status-pill{
    display:flex; align-items:center; gap:6px;
    font-size:13px; color:#cfd6e6; padding-top:6px;
  }
  .dot{ width:8px;height:8px;border-radius:50%; background:#3fd17a; box-shadow:0 0 0 3px rgba(63,209,122,.18); }

  nav.tabs{
    max-width:1180px;
    margin:14px auto 0 auto;
    padding:0 24px;
    display:flex;
    gap:28px;
  }
  nav.tabs button{
    background:none;border:none;cursor:pointer;
    font-family:inherit; font-weight:700; font-size:14px;
    letter-spacing:.04em;
    color:#9aa3bd;
    padding:0 0 12px 0;
    border-bottom:3px solid transparent;
  }
  nav.tabs button.active{
    color:#fff;
    border-bottom-color:var(--maroon);
  }
  nav.tabs button .ic{ margin-right:6px; }

  /* ---------- LAYOUT ---------- */
  main{ max-width:1180px; margin:0 auto; padding:32px 24px 80px 24px; }
  .page-head{
    display:flex; align-items:flex-start; justify-content:space-between;
    flex-wrap:wrap; gap:16px;
    margin-bottom:22px;
  }
  .page-head h2{ margin:0 0 4px 0; font-size:26px; color:var(--text-dark); }
  .page-head .sub{ font-family:'Segoe UI',sans-serif; color:var(--text-gray); font-size:13.5px; margin:0; }

  /* buttons */
  .btn{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    font-weight:700; font-size:13px; letter-spacing:.02em;
    padding:11px 20px; border-radius:7px; border:1px solid transparent;
    cursor:pointer; display:inline-flex; align-items:center; gap:7px;
    transition: transform .04s ease, opacity .15s ease;
  }
  .btn:active{ transform: translateY(1px); }
  .btn-maroon{ background:var(--maroon); color:#fff; }
  .btn-maroon:hover{ background:var(--maroon-dark); }
  .btn-navy{ background:var(--navy); color:#fff; }
  .btn-navy:hover{ background:var(--navy-light); }
  .btn-outline{ background:#fff; border-color:#d8d0bd; color:var(--text-dark); }
  .btn-outline:hover{ background:var(--cream-dark); }
  .btn-row{ display:flex; gap:10px; flex-wrap:wrap; }

  /* stat cards */
  .stats{
    display:grid; grid-template-columns:repeat(4,1fr); gap:18px;
    margin-bottom:28px;
  }
  @media (max-width:760px){ .stats{ grid-template-columns:repeat(2,1fr);} }
  .stat-card{
    background:var(--white); border:1px solid var(--border); border-top:4px solid var(--maroon);
    border-radius:8px; padding:22px 18px; text-align:center; box-shadow:var(--shadow);
  }
  .stat-card.c-navy{ border-top-color:var(--navy); }
  .stat-card.c-amber{ border-top-color:var(--amber); }
  .stat-card.c-green{ border-top-color:var(--green); }
  .stat-num{ font-size:34px; font-weight:700; color:var(--maroon); line-height:1; }
  .stat-card.c-navy .stat-num{ color:var(--navy); }
  .stat-card.c-amber .stat-num{ color:var(--amber); }
  .stat-card.c-green .stat-num{ color:var(--green); }
  .stat-label{ font-family:'Segoe UI',sans-serif; text-transform:uppercase; font-size:11.5px; letter-spacing:.06em; color:var(--text-gray); margin-top:6px; }

  /* panel / table */
  .panel{ background:var(--white); border:1px solid var(--border); border-radius:8px; box-shadow:var(--shadow); overflow:hidden; }
  .panel-head{ padding:18px 22px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;}
  .panel-head h3{ margin:0; font-size:18px; }
  table{ width:100%; border-collapse:collapse; font-family:'Segoe UI',sans-serif; }
  thead th{
    text-align:left; background:var(--cream-dark); color:var(--text-gray);
    font-size:12px; text-transform:uppercase; letter-spacing:.05em;
    padding:12px 18px; border-bottom:1px solid var(--border); font-weight:700;
  }
  tbody td{ padding:14px 18px; border-bottom:1px solid var(--border); font-size:14.5px; vertical-align:middle; }
  tbody tr:last-child td{ border-bottom:none; }
  tbody tr:hover{ background:#fbf8f1; }
  .title-cell{ font-weight:700; color:var(--text-dark); max-width:320px; }
  .muted{ color:var(--text-gray); }
  .empty-state{ padding:48px 24px; text-align:center; font-family:'Segoe UI',sans-serif; color:var(--text-gray); }
  .empty-state .btn{ margin-top:14px; }

  .badge{
    display:inline-block; padding:4px 12px; border-radius:999px;
    font-size:12px; font-weight:700; color:#fff; white-space:nowrap;
  }
  .b-filed{ background:var(--blue); }
  .b-published, .b-pending{ background:var(--amber); }
  .b-granted, .b-registered{ background:var(--green); }
  .b-rejected{ background:var(--red); }
  .b-none{ background:#a9a290; }

  .row-actions{ display:flex; gap:12px; }
  .icon-btn{ background:none; border:none; cursor:pointer; color:#8a8473; padding:2px; display:flex; }
  .icon-btn:hover{ color:var(--navy); }
  .icon-btn.danger:hover{ color:var(--red); }

  /* ---------- FORM ---------- */
  .form-section{ background:var(--white); border:1px solid var(--border); border-radius:8px; box-shadow:var(--shadow); margin-bottom:22px; }
  .form-section h4{ margin:0; padding:18px 22px; font-size:16.5px; border-bottom:1px solid var(--border); }
  .form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:20px 22px; }
  .form-grid.single{ grid-template-columns:1fr; }
  @media (max-width:700px){ .form-grid{ grid-template-columns:1fr; } }
  .field label{ display:block; font-family:'Segoe UI',sans-serif; font-size:12.5px; color:var(--text-gray); margin-bottom:6px; }
  .field label .req{ color:var(--maroon); }
  .field input, .field select, .field textarea{
    width:100%; padding:11px 13px; border:1px solid #d8d0bd; border-radius:6px;
    font-family:'Segoe UI',sans-serif; font-size:14px; color:var(--text-dark); background:#fffefb;
  }
  .field input:focus, .field select:focus, .field textarea:focus{ outline:2px solid var(--maroon); outline-offset:1px; border-color:var(--maroon); }
  .field-full{ grid-column:1 / -1; }

  .subhead{ font-family:'Segoe UI',sans-serif; font-weight:700; font-size:14px; color:var(--text-dark); margin:0; padding:16px 22px 0 22px; }
  .sub-table-wrap{ padding:0 22px 20px 22px; }
  .sub-table{ width:100%; border-collapse:collapse; }
  .sub-table th{ text-align:left; font-family:'Segoe UI',sans-serif; font-size:12px; text-transform:uppercase; color:var(--text-gray); padding:8px 6px; border-bottom:1px solid var(--border); }
  .sub-table td{ padding:8px 6px; vertical-align:top; }
  .sub-table input, .sub-table select{ padding:9px 10px; font-size:13.5px; }
  .add-link{ background:none; border:none; color:var(--navy); font-weight:700; cursor:pointer; font-family:'Segoe UI',sans-serif; font-size:13.5px; padding:14px 22px 18px 22px; display:flex; align-items:center; gap:6px; }
  .add-link:hover{ text-decoration:underline; }
  .empty-sub{ font-family:'Segoe UI',sans-serif; color:var(--text-gray); font-size:13.5px; padding:4px 22px 14px 22px; }

  .upload-box{
    display:block;
    margin:0 22px 20px 22px;
    border:2px dashed #d8d0bd; border-radius:8px; padding:26px; text-align:center;
    font-family:'Segoe UI',sans-serif; color:var(--text-gray); cursor:pointer; background:#fbf8f1;
  }
  .upload-box:hover{ border-color:var(--maroon); }
  .upload-box input{ display:none; }
  .upload-box .upload-icon{ font-size:22px; line-height:1; margin-bottom:6px; }
  .upload-box .upload-main{ font-weight:600; color:var(--text-dark); }
  .upload-box .upload-sub{ font-size:12px; margin-top:4px; }
  .file-chip{ display:inline-flex; align-items:center; gap:8px; background:var(--cream-dark); border:1px solid var(--border); border-radius:6px; padding:6px 10px; margin:4px 6px 0 0; font-size:12.5px; }
  .file-chip button{ background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;line-height:1; }
  .doc-note{ font-size:11.5px; color:#9a937f; margin-top:10px; }

  .form-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:6px; }

  /* modal */
  .overlay{ position:fixed; inset:0; background:rgba(26,20,12,.45); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px; }
  .modal{ background:var(--white); border-radius:10px; max-width:560px; width:100%; max-height:85vh; overflow-y:auto; box-shadow:0 12px 40px rgba(0,0,0,.25); }
  .modal-head{ padding:18px 22px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .modal-head h3{ margin:0; }
  .modal-close{ background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-gray); }
  .modal-body{ padding:20px 22px; font-family:'Segoe UI',sans-serif; font-size:14px; }
  .modal-body .kv{ display:grid; grid-template-columns:160px 1fr; gap:8px 12px; padding:8px 0; border-bottom:1px solid #f0ebe0; }
  .modal-body .kv b{ color:var(--text-gray); font-weight:600; font-size:12.5px; text-transform:uppercase; letter-spacing:.03em; }
  .modal-foot{ padding:14px 22px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }
  .modal.small{ max-width:380px; }
  .modal.small .modal-body{ font-size:14.5px; line-height:1.5; }

  /* toast */
  #toast{
    position:fixed; bottom:22px; right:22px; background:var(--navy); color:#fff;
    padding:13px 20px; border-radius:7px; font-family:'Segoe UI',sans-serif; font-size:13.5px;
    box-shadow:0 6px 20px rgba(0,0,0,.2); opacity:0; transform:translateY(10px);
    transition:opacity .25s ease, transform .25s ease; z-index:100; pointer-events:none;
    border-left:4px solid var(--maroon);
  }
  #toast.show{ opacity:1; transform:translateY(0); }
  #toast.error{ border-left-color:var(--red); }

  .loading-line{ font-family:'Segoe UI',sans-serif; color:var(--text-gray); padding:40px; text-align:center; }
  .field-hint{ font-family:'Segoe UI',sans-serif; font-size:11px; color:#9a937f; margin-top:3px; display:block; }
  .char-counter{ font-family:'Segoe UI',sans-serif; font-size:11px; color:#9a937f; text-align:right; margin-top:2px; }
  .char-counter.warn{ color:var(--amber); }
  .char-counter.over{ color:var(--red); }
</style>
</head>

function fmtDate(d){ if(!d) return '—'; const parts = d.split('-'); if(parts.length===3) return parts[2]+'-'+parts[1]+'-'+parts[0]; return d; }

function toast(msg, isError){

/* ===================== CONFIG ===================== */
const CONFIG = {

};

/* ===================== STORAGE (Google Sheets via Apps Script) ===================== */
async function apiCall(action, sheet, payload){
  if(!CONFIG.SCRIPT_URL || CONFIG.SCRIPT_URL.indexOf('PASTE_YOUR') === 0){
    throw new Error('NOT_CONFIGURED');
  }
  const body = Object.assign({ action, sheet }, payload || {});
  const res = await fetch(CONFIG.SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body)
  });
  const json = await res.json();
  if(!json.ok) throw new Error(json.error || 'Request failed');
  return json.data;
}

async function loadAll(){
  try{
    const [patents, copyrights] = await Promise.all([
      apiCall('list', 'patent'),
      apiCall('list', 'copyright')
    ]);
    state.patents = (patents || []).sort((a,b)=> (b.createdAt||0) - (a.createdAt||0));
    state.copyrights = (copyrights || []).sort((a,b)=> (b.createdAt||0) - (a.createdAt||0));
    const lbl = document.getElementById('conn-label');
    if(lbl) lbl.textContent = 'Connected · Live shared records';
  }catch(e){
    console.error('Load error', e);
    if(e.message === 'NOT_CONFIGURED'){
      document.getElementById('main').innerHTML = `<div class="empty-state">⚠️ This portal isn't connected to Google Sheets yet.<br>Paste your Apps Script Web App URL into <code>CONFIG.SCRIPT_URL</code> near the top of the script.</div>`;
    } else {
      toast('Could not load records. Check your connection and reload.', true);
    }
  }
}

function renderSearch(){
  return `
    <div class="page-head">

        </div>

          <label>Type</label>

            <option value="">All Types</option>
            <option value="patent">Patents</option>

        </div>

          <label>Status</label>
          <select id="s_status" onchange="runSearch()">

            <option value="Pending">Pending</option>

          </select>
        </div>
        <div class="field" style="margin:0;">
          <label>Department</label>
          <input id="s_dept" placeholder="e.g. Pharmacology" oninput="runSearch()">
        </div>
        <div style="padding-bottom:1px;">

        </div>
      </div>
    </div>

    <div id="search-results"></div>
  `;
}

function wireSearch(){ runSearch(); }

function clearSearch(){
  document.getElementById('s_query').value = '';
  document.getElementById('s_type').value = '';
  document.getElementById('s_status').value = '';
  document.getElementById('s_dept').value = '';
  runSearch();
}

function runSearch(){
  const q    = (document.getElementById('s_query')?.value  || '').toLowerCase().trim();
  const type = (document.getElementById('s_type')?.value   || '');
  const stat = (document.getElementById('s_status')?.value || '');
  const dept = (document.getElementById('s_dept')?.value   || '').toLowerCase().trim();

  let results = [];

  if(type === '' || type === 'patent'){
    state.patents.forEach(r => {
      const text = [r.title, r.facultyName, r.applicationNumber, r.department, r.domain, r.type,
                    (r.inventors||[]).map(i=>i.name).join(' ')].join(' ').toLowerCase();
      if(q && !text.includes(q)) return;
      if(stat && r.status !== stat) return;
      if(dept && !(r.department||'').toLowerCase().includes(dept)) return;
      results.push({ kind:'patent', rec:r });
    });
  }

  if(type === '' || type === 'copyright'){
    state.copyrights.forEach(r => {
      const text = [r.title, r.author, r.diaryNumber, r.department, r.classOfWork, r.registrationNumber].join(' ').toLowerCase();
      if(q && !text.includes(q)) return;
      if(stat && r.status !== stat) return;
      if(dept && !(r.department||'').toLowerCase().includes(dept)) return;
      results.push({ kind:'copyright', rec:r });
    });
  }

  results.sort((a,b) => (b.rec.createdAt||0) - (a.rec.createdAt||0));

  const container = document.getElementById('search-results');
  if(!container) return;

  if(results.length === 0){
    container.innerHTML = `<div class="empty-state">No records match your search.<br><span style="font-size:13px;color:var(--text-gray)">Try adjusting the filters or clearing the keyword.</span></div>`;
    return;
  }

  const rows = results.map(({kind, rec}) => {
    const isPatent = kind === 'patent';
    const kindBadge = isPatent
      ? `<span class="badge b-filed" style="background:var(--navy);font-size:11px;">📄 Patent</span>`
      : `<span class="badge b-none" style="background:var(--maroon);font-size:11px;">© Copyright</span>`;
    const title = esc(truncate(rec.title, 60));
    const sub   = isPatent
      ? esc(rec.applicationNumber ? 'App No: '+rec.applicationNumber : (rec.domain||''))
      : esc(rec.diaryNumber ? 'Diary No: '+rec.diaryNumber : (rec.classOfWork||''));
    const who   = esc(isPatent ? (rec.facultyName||'—') : (rec.author||'—'));
    const dept  = esc(rec.department||'—');
    const date  = fmtDate(rec.filingDate);
    return `
      <tr>
        <td>${kindBadge}</td>
        <td class="title-cell">${title}<br><span class="muted" style="font-size:12px;font-weight:400;">${sub}</span></td>
        <td class="muted">${who}</td>
        <td class="muted">${dept}</td>
        <td><span class="badge ${badgeClass(rec.status)}">${esc(rec.status||'—')}</span></td>
        <td class="muted">${date}</td>
        <td>
          <div class="row-actions">
            <button class="icon-btn" title="View" onclick="openView('${kind}','${rec.id}')">${ICON_EYE}</button>
            <button class="icon-btn" title="Edit" onclick="searchGoEdit('${kind}','${rec.id}')">${ICON_EDIT}</button>
            <button class="icon-btn danger" title="Delete" onclick="confirmDelete('${kind}','${rec.id}')">${ICON_TRASH}</button>
          </div>
        </td>
      </tr>`;
  }).join('');

  container.innerHTML = `
    <div class="panel">
      <div class="panel-head">
        <h3>Results <span style="font-weight:400;color:var(--text-gray);font-size:15px;">(${results.length} record${results.length===1?'':'s'})</span></h3>
      </div>
      <table>
        <thead><tr><th>Type</th><th>Title / Reference</th><th>Faculty / Author</th><th>Department</th><th>Status</th><th>Filing Date</th><th>Actions</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function searchGoEdit(kind, id){
  state.tab = kind==='patent' ? 'patents' : 'copyright';
  state.editingId = id;
  state.view = 'form';
  document.getElementById('tab-home').classList.toggle('active', false);
  document.getElementById('tab-patents').classList.toggle('active', kind==='patent');
  document.getElementById('tab-copyright').classList.toggle('active', kind==='copyright');
  document.getElementById('tab-search').classList.toggle('active', false);

}

let formInventors = [];
let formApplicants = [];
let formDocs = [];

function wirePatentForm(){
  const rec = getEditingPatent();
  formInventors = rec && rec.inventors && rec.inventors.length ? JSON.parse(JSON.stringify(rec.inventors)) : [{name:'',affiliation:'',role:'Principal Inventor'}];
  formApplicants = rec && rec.applicants ? JSON.parse(JSON.stringify(rec.applicants)) : [];
  formDocs = rec && rec.documents ? JSON.parse(JSON.stringify(rec.documents)) : [];
  renderInventorRows();
  renderApplicantRows();
  renderDocChips();
  onPatentTypeChange();

  // Real-time blur validation — Faculty Details
  const blurRulesPatent = {
    f_facultyName: v => !v ? 'Faculty name is required.' : v.length < 3 ? 'Name must be at least 3 characters.' : !isAlphaSpace(v) ? 'Name must contain only letters and spaces.' : '',
    f_designation: v => !v ? 'Designation is required.' : !isAlphaSpace(v) ? 'Use letters and spaces only.' : '',
    f_department:  v => !v ? 'Department is required.' : !isAlphaSpace(v) ? 'Use letters and spaces only.' : '',
    f_institute:   v => !v ? 'Please select a college.' : '',
    f_email:       v => !v ? 'Email is required.' : !isValidEmail(v) ? 'Enter a valid email address.' : '',
    f_mobile:      v => !v ? 'Mobile number is required.' : !isValidMobile(v) ? 'Enter a valid 10-digit Indian mobile number.' : '',
    f_title:       v => !v ? 'Patent title is required.' : v.length < 10 ? 'Title must be at least 10 characters.' : '',
    f_type:        v => !v ? 'Please select a patent type.' : '',
    f_designCRN:   v => v && !/^[A-Za-z0-9\/\-\s]+$/.test(v) ? 'CRN must be alphanumeric (letters, digits, hyphens, slashes).' : '',
    f_academicSession: v => v && !/^\d{4}-\d{2}$/.test(v) ? 'Format must be YYYY-YY (e.g. 2025-26).' : '',
    f_status:      v => !v ? 'Please select a status.' : '',
  };
  Object.keys(blurRulesPatent).forEach(id => {
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('blur', () => {
      const err = blurRulesPatent[id](el.value.trim());
      err ? showFieldError(id, err) : clearFieldError(id);
    });
    el.addEventListener('input', () => { if(el.parentElement.querySelector('.field-err')) { const err = blurRulesPatent[id](el.value.trim()); err ? showFieldError(id, err) : clearFieldError(id); } });
  });

  // Character counters for long text fields
  function wireCharCounter(id, max){
    const el = document.getElementById(id);
    if(!el) return;
    let counter = el.parentElement.querySelector('.char-counter');
    if(!counter){ counter = document.createElement('div'); counter.className='char-counter'; el.parentElement.appendChild(counter); }
    const update = () => {
      const len = el.value.length;
      counter.textContent = `${len} / ${max}`;
      counter.className = 'char-counter' + (len > max*0.9 && len < max ? ' warn' : len >= max ? ' over' : '');
    };
    el.addEventListener('input', update);
    update();
  }
  wireCharCounter('f_title', 300);

  // File upload: type + size (5 MB max per file)
  document.getElementById('f_docs').addEventListener('change', (e)=>{
    const allowed = ['application/pdf','image/jpeg','image/png','image/gif','image/webp',
      'application/msword','application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
    Array.from(e.target.files).forEach(f=>{
      if(!allowed.includes(f.type) && !f.name.match(/\.(pdf|jpg|jpeg|png|gif|webp|doc|docx)$/i)){
        toast(`"${f.name}" is not an allowed file type. Use PDF, image, or Word files.`, true); return;
      }
      if(f.size > 5 * 1024 * 1024){ toast(`"${f.name}" exceeds the 5 MB size limit.`, true); return; }
      formDocs.push({name:f.name, size:f.size});
    });
    renderDocChips();
    e.target.value = '';
  });
}

/* ===================== VALIDATION HELPERS ===================== */
function showFieldError(id, msg){
  const el = document.getElementById(id);
  if(!el) return;
  el.style.borderColor = 'var(--red)';
  el.style.outlineColor = 'var(--red)';
  let err = el.parentElement.querySelector('.field-err');
  if(!err){ err = document.createElement('span'); err.className='field-err'; err.style.cssText='color:var(--red);font-family:"Segoe UI",sans-serif;font-size:11.5px;margin-top:4px;display:block;'; el.parentElement.appendChild(err); }
  err.textContent = msg;
}
function clearFieldError(id){
  const el = document.getElementById(id);
  if(!el) return;
  el.style.borderColor = '';
  el.style.outlineColor = '';
  const err = el.parentElement.querySelector('.field-err');
  if(err) err.remove();
}
function clearAllErrors(){
  document.querySelectorAll('.field-err').forEach(e=>e.remove());
  document.querySelectorAll('input,select,textarea').forEach(e=>{ e.style.borderColor=''; e.style.outlineColor=''; });
}

function isAlphaSpace(s){ return /^[A-Za-z\s.'-]+$/.test(s.trim()); }
function isValidEmail(s){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s.trim()); }
function isInstituteMail(s){ return s.trim().toLowerCase().endsWith('@santosh.ac.in'); }
function normalisePhone(s){ return s.replace(/[\s\-\+]/g,'').replace(/^91/,''); }
function isValidMobile(s){ const n = normalisePhone(s); return /^\d{10}$/.test(n); }
function isAlphaNumDash(s){ return /^[A-Za-z0-9\/\-\/\s]+$/.test(s.trim()); }
function isPastOrToday(d){ return d && d <= new Date().toISOString().slice(0,10); }
function isDateAfter(a,b){ return a && b && a > b; }

async function submitPatentForm(){
  clearAllErrors();
  let valid = true;
  function fail(id, msg){ showFieldError(id, msg); valid = false; }

  // Section 1 — Faculty Details
  const facultyName = document.getElementById('f_facultyName').value.trim();
  if(!facultyName) fail('f_facultyName','Faculty name is required.');
  else if(facultyName.length < 3) fail('f_facultyName','Name must be at least 3 characters.');
  else if(!isAlphaSpace(facultyName)) fail('f_facultyName','Name must contain only letters and spaces.');

  const designation = document.getElementById('f_designation').value.trim();
  if(!designation) fail('f_designation','Designation is required.');
  else if(!isAlphaSpace(designation)) fail('f_designation','Designation must contain only letters and spaces.');

  const department = document.getElementById('f_department').value.trim();
  if(!department) fail('f_department','Department is required.');
  else if(!isAlphaSpace(department)) fail('f_department','Department must contain only letters and spaces.');

  const institute = document.getElementById('f_institute').value;
  if(!institute) fail('f_institute','Please select a college.');

  const email = document.getElementById('f_email').value.trim();
  if(!email) fail('f_email','Email is required.');
  else if(!isValidEmail(email)) fail('f_email','Enter a valid email address.');

  const mobile = document.getElementById('f_mobile').value.trim();
  if(!mobile) fail('f_mobile','Mobile number is required.');
  else if(!isValidMobile(mobile)) fail('f_mobile','Enter a valid 10-digit Indian mobile number.');

  // Section 2 — Patent Information
  const title = document.getElementById('f_title').value.trim();
  if(!title) fail('f_title','Patent title is required.');
  else if(title.length < 10) fail('f_title','Title must be at least 10 characters.');

  const ptype = document.getElementById('f_type').value;
  if(!ptype) fail('f_type','Please select a patent type.');

  if(ptype === 'Design Patent'){
    const designCRN = document.getElementById('f_designCRN')?.value.trim();
    if(!designCRN) fail('f_designCRN','Design CRN No. is required for Design Patent.');
  }

  // Section 3 — Inventors: at least one with a name
  const namedInventors = formInventors.filter(i=>i.name.trim());
  if(!namedInventors.length){
    toast('At least one inventor name is required.', true);
    valid = false;
  }

  // Section 5 — Status & filing details
  const status = document.getElementById('f_status').value;
  if(!status) fail('f_status','Please select a status.');

  if(status === 'Filed' || status === 'Published' || status === 'Granted'){
    const appNum = document.getElementById('f_appNumber')?.value.trim();
    if(!appNum) fail('f_appNumber','Application number is required.');
    else if(!isAlphaNumDash(appNum)) fail('f_appNumber','Application number must be alphanumeric.');

    const filingDate = document.getElementById('f_filingDate')?.value;
    if(!filingDate) fail('f_filingDate','Filing date is required.');
    else if(!isPastOrToday(filingDate)) fail('f_filingDate','Filing date cannot be in the future.');

    const country = document.getElementById('f_country')?.value.trim();
    if(!country) fail('f_country','Country is required.');
    else if(!isAlphaSpace(country)) fail('f_country','Enter a valid country name.');
  }
  if(status === 'Published' || status === 'Granted'){
    const pubDate = document.getElementById('f_publicationDate')?.value;
    const filingDate = document.getElementById('f_filingDate')?.value;
    if(!pubDate) fail('f_publicationDate','Publication date is required.');
    else if(!isPastOrToday(pubDate)) fail('f_publicationDate','Publication date cannot be in the future.');
    else if(filingDate && !isDateAfter(pubDate, filingDate)) fail('f_publicationDate','Publication date must be after filing date.');
  }
  if(status === 'Granted'){
    const grantNum = document.getElementById('f_grantNumber')?.value.trim();
    if(!grantNum) fail('f_grantNumber','Grant number is required.');
    else if(!isAlphaNumDash(grantNum)) fail('f_grantNumber','Grant number must be alphanumeric.');

    const grantDate = document.getElementById('f_grantDate')?.value;
    const pubDate = document.getElementById('f_publicationDate')?.value;
    if(!grantDate) fail('f_grantDate','Grant date is required.');
    else if(!isPastOrToday(grantDate)) fail('f_grantDate','Grant date cannot be in the future.');
    else if(pubDate && !isDateAfter(grantDate, pubDate)) fail('f_grantDate','Grant date must be after publication date.');
  }
  if(status === 'Registered'){
    const appNum = document.getElementById('f_appNumber')?.value.trim();
    if(!appNum) fail('f_appNumber','Application number is required.');
    else if(!isAlphaNumDash(appNum)) fail('f_appNumber','Application number must be alphanumeric.');

    const filingDate = document.getElementById('f_filingDate')?.value;
    if(!filingDate) fail('f_filingDate','Filing date is required.');
    else if(!isPastOrToday(filingDate)) fail('f_filingDate','Filing date cannot be in the future.');

    const regDesignNum = document.getElementById('f_registeredDesignNumber')?.value.trim();
    if(!regDesignNum) fail('f_registeredDesignNumber','Registered Design Number is required.');
    else if(!isAlphaNumDash(regDesignNum)) fail('f_registeredDesignNumber','Registered Design Number must be alphanumeric.');

    const country = document.getElementById('f_country')?.value.trim();
    if(!country) fail('f_country','Country is required.');
    else if(!isAlphaSpace(country)) fail('f_country','Enter a valid country name.');
  }

  if(!valid){ toast('Please fix the errors highlighted in the form.', true); return; }

  const getVal = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  const rec = {
    id: state.editingId || uid(),
    createdAt: (getEditingPatent()?.createdAt) || Date.now(),
    facultyName, designation, department,
    institute: document.getElementById('f_institute').value,
    email, mobile,
    title, type: ptype,
    designCRN: getVal('f_designCRN'),
    academicSession: document.getElementById('f_academicSession').value,
    pocStatus: '', commercialPotential: '', seedGrantRef: '',
    inventors: namedInventors,
    applicants: formApplicants.filter(a=>a.name.trim()),
    status,
    applicationNumber: getVal('f_appNumber'),
    filingDate: getVal('f_filingDate'),
    country: getVal('f_country'),
    publicationDate: getVal('f_publicationDate'),
    grantNumber: getVal('f_grantNumber'),
    grantDate: getVal('f_grantDate'),
    registeredDesignNumber: getVal('f_registeredDesignNumber'),
    documents: formDocs
  };
  try{
    await savePatent(rec);
    toast('Patent saved successfully.');
    await loadAll();
    state.view='dashboard'; state.editingId=null;
    render();
  }catch(e){
    console.error(e);
    toast('Could not save patent. Please try again.', true);
  }
}

let formCertDoc = null;
let formCoAuthors = [];

function wireCopyrightForm(){
  const rec = getEditingCopyright();
  formCertDoc = rec && rec.certificate ? rec.certificate : null;
  formCoAuthors = rec && rec.coAuthors ? JSON.parse(JSON.stringify(rec.coAuthors)) : [];
  renderCertChip();
  renderCoInventorRows();

  // Real-time blur validation
  const blurRulesCopyright = {
    c_diaryNumber: v => !v ? 'Diary number is required.' : !isAlphaNumDash(v) ? 'Must be alphanumeric (letters, digits, hyphens).' : '',
    c_rocNumber:   v => v && !isAlphaNumDash(v) ? 'ROC number must be alphanumeric.' : '',
    c_filingDate:  v => !v ? 'Filing date is required.' : !isPastOrToday(v) ? 'Filing date cannot be in the future.' : '',
    c_title:       v => !v ? 'Title of work is required.' : v.length < 5 ? 'Title must be at least 5 characters.' : v.length > 300 ? 'Title must not exceed 300 characters.' : '',
    c_classOfWork: v => !v ? 'Please select the class of work.' : '',
    c_author:      v => !v ? 'Author / Faculty name is required.' : !isAlphaSpace(v) ? 'Use letters and spaces only.' : '',
    c_department:  v => !v ? 'Department is required.' : !isAlphaSpace(v) ? 'Use letters and spaces only.' : '',
    c_status:      v => !v ? 'Please select a status.' : '',
    c_calendarYear: v => v && !/^\d{4}$/.test(v) ? 'Enter a valid 4-digit year (e.g. 2025).' : '',
    c_regNumber:   v => {
      const status = document.getElementById('c_status')?.value;
      if(status === 'Registered' && !v) return 'Registration number is required when status is Registered.';
      if(v && !isAlphaNumDash(v)) return 'Must be alphanumeric (letters, digits, hyphens).';
      return '';
    },
    c_regDate:     v => {
      const status = document.getElementById('c_status')?.value;
      const filing = document.getElementById('c_filingDate')?.value;
      if(status === 'Registered' && !v) return 'Registration date is required when status is Registered.';
      if(v && !isPastOrToday(v)) return 'Registration date cannot be in the future.';
      if(v && filing && !isDateAfter(v, filing)) return 'Registration date must be after filing date.';
      return '';
    },
  };
  Object.keys(blurRulesCopyright).forEach(id => {
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('blur', () => {
      const err = blurRulesCopyright[id](el.value.trim());
      err ? showFieldError(id, err) : clearFieldError(id);
    });
    el.addEventListener('input', () => { if(el.parentElement.querySelector('.field-err')) { const err = blurRulesCopyright[id](el.value.trim()); err ? showFieldError(id, err) : clearFieldError(id); } });
  });

  // Character counter for title
  function wireCCharCounter(id, max){
    const el = document.getElementById(id);
    if(!el) return;
    let counter = el.parentElement.querySelector('.char-counter');
    if(!counter){ counter = document.createElement('div'); counter.className='char-counter'; el.parentElement.appendChild(counter); }
    const update = () => {
      const len = el.value.length;
      counter.textContent = `${len} / ${max}`;
      counter.className = 'char-counter' + (len > max*0.9 && len < max ? ' warn' : len >= max ? ' over' : '');
    };
    el.addEventListener('input', update);
    update();
  }
  wireCCharCounter('c_title', 300);

  // When status changes, re-validate reg number & date
  document.getElementById('c_status')?.addEventListener('change', () => {
    ['c_regNumber','c_regDate'].forEach(id => {
      const el = document.getElementById(id);
      if(el && el.parentElement.querySelector('.field-err')){ const err = blurRulesCopyright[id](el.value.trim()); err ? showFieldError(id, err) : clearFieldError(id); }
    });
  });

  // Certificate upload: PDF or image only, max 5 MB
  document.getElementById('c_certUpload').addEventListener('change', (e)=>{
    const f = e.target.files[0];
    if(!f) return;
    const allowed = ['application/pdf','image/jpeg','image/png','image/gif','image/webp'];
    if(!allowed.includes(f.type) && !f.name.match(/\.(pdf|jpg|jpeg|png|gif|webp)$/i)){
      toast('Only PDF or image files are allowed for the certificate.', true); e.target.value=''; return;
    }
    if(f.size > 5 * 1024 * 1024){ toast(`"${f.name}" exceeds the 5 MB size limit.`, true); e.target.value=''; return; }
    formCertDoc = {name:f.name, size:f.size}; renderCertChip();
    e.target.value='';
  });
}

async function submitCopyrightForm(){
  clearAllErrors();
  let valid = true;
  function fail(id, msg){ showFieldError(id, msg); valid = false; }

  const getVal = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };

  // Diary Number — required, alphanumeric
  const diaryNo = getVal('c_diaryNumber');
  if(!diaryNo) fail('c_diaryNumber','Diary number is required.');
  else if(!isAlphaNumDash(diaryNo)) fail('c_diaryNumber','Diary number must be alphanumeric (letters, digits, hyphens).');

  // ROC No — optional but if filled, alphanumeric
  const rocNo = getVal('c_rocNumber');
  if(rocNo && !isAlphaNumDash(rocNo)) fail('c_rocNumber','ROC number must be alphanumeric.');

  // Filing Date — required, not in future
  const filingDate = document.getElementById('c_filingDate').value;
  if(!filingDate) fail('c_filingDate','Filing date is required.');
  else if(!isPastOrToday(filingDate)) fail('c_filingDate','Filing date cannot be in the future.');

  // Title — required, min 5 chars
  const title = getVal('c_title');
  if(!title) fail('c_title','Title of work is required.');
  else if(title.length < 5) fail('c_title','Title must be at least 5 characters.');

  // Class of Work — required
  const classOfWork = document.getElementById('c_classOfWork').value;
  if(!classOfWork) fail('c_classOfWork','Please select the class of work.');

  // Author — required, letters/spaces only
  const author = getVal('c_author');
  if(!author) fail('c_author','Author / Faculty name is required.');
  else if(!isAlphaSpace(author)) fail('c_author','Author name must contain only letters and spaces.');

  // Department — required, letters/spaces only
  const department = getVal('c_department');
  if(!department) fail('c_department','Department is required.');
  else if(!isAlphaSpace(department)) fail('c_department','Department must contain only letters and spaces.');

  // Status — required
  const status = document.getElementById('c_status').value;
  if(!status) fail('c_status','Please select a status.');

  // Registration Number & Date — required only when Registered
  const regNumber = getVal('c_regNumber');
  const regDate = document.getElementById('c_regDate').value;
  if(status === 'Registered'){
    if(!regNumber) fail('c_regNumber','Registration number is required when status is Registered.');
    else if(!isAlphaNumDash(regNumber)) fail('c_regNumber','Registration number must be alphanumeric.');
    if(!regDate) fail('c_regDate','Registration date is required when status is Registered.');
    else if(!isPastOrToday(regDate)) fail('c_regDate','Registration date cannot be in the future.');
    else if(filingDate && !isDateAfter(regDate, filingDate)) fail('c_regDate','Registration date must be after filing date.');
  } else {
    // Optional but validate format if filled
    if(regNumber && !isAlphaNumDash(regNumber)) fail('c_regNumber','Registration number must be alphanumeric.');
    if(regDate && !isPastOrToday(regDate)) fail('c_regDate','Registration date cannot be in the future.');
    if(regDate && filingDate && !isDateAfter(regDate, filingDate)) fail('c_regDate','Registration date must be after filing date.');
  }

  // Co-inventors — if a row exists, name must be filled
  formCoAuthors.forEach((ca, i) => {
    if(!ca.name.trim()){
      toast(`Co-inventor row ${i+1}: name is required.`, true);
      valid = false;
    }
  });

  if(!valid){ toast('Please fix the errors highlighted in the form.', true); return; }

  const rec = {
    id: state.editingId || uid(),
    createdAt: (getEditingCopyright()?.createdAt) || Date.now(),
    diaryNumber: diaryNo,
    rocNumber: rocNo,
    filingDate,
    isbnNumber: '',
    academicYear: getVal('c_academicYear'),
    calendarYear: getVal('c_calendarYear'),
    title,
    classOfWork,
    author,
    department,
    status,
    registrationNumber: regNumber,
    registrationDate: regDate,
    commModel: '',
    coAuthors: formCoAuthors.filter(c=>c.name.trim()),
    certificate: formCertDoc
  };
  try{
    await saveCopyright(rec);
    toast('Copyright saved successfully.');
    await loadAll();
    state.view='dashboard'; state.editingId=null;
    render();
  }catch(e){
    console.error(e);
    toast('Could not save copyright record. Please try again.', true);
  }
}

      </div>

        <input type="file" id="imp-file" accept=".xlsx,.xls,.csv">
        <div class="upload-icon">📥</div>

        <div class="upload-sub">.xlsx, .xls or .csv supported</div>
      </label>
    </div>

    <div id="imp-preview-area"></div>
  `;
}

function setImportKind(kind){
  importState = { kind, rows: [], headers: [], mapping: {}, errors: [], importing: false };
  render();
}

function wireImport(){
  if(!importState.kind) return;
  const fileInput = document.getElementById('imp-file');
  if(fileInput){
    fileInput.addEventListener('change', async (e) => {
      const f = e.target.files[0];
      if(!f) return;
      await parseImportFile(f);
      e.target.value = '';
    });
  }
  if(importState.rows.length) renderImportPreview();
}

async function parseImportFile(file){
  try{
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array', cellDates:true});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
    if(raw.length < 2){ toast('File appears empty or has only a header row.', true); return; }

    const headers = raw[0].map(h => String(h).trim());
    const rows = raw.slice(1).filter(r => r.some(c => String(c).trim() !== ''));

    // Auto-map columns based on header names
    const autoMap = buildAutoMapping(headers, importState.kind);
    importState.headers = headers;
    importState.rows = rows;
    importState.mapping = autoMap;
    importState.errors = [];

    renderImportPreview();
    toast(`Loaded ${rows.length} row${rows.length===1?'':'s'} from "${file.name}".`);
  }catch(err){
    console.error(err);
    toast('Could not read the file. Make sure it is a valid Excel or CSV file.', true);
  }
}

function buildAutoMapping(headers, kind){
  const PATENT_FIELDS = [
    {key:'facultyName',    labels:['faculty name','faculty','name','full name']},
    {key:'designation',    labels:['designation','title']},
    {key:'department',     labels:['department','dept']},
    {key:'institute',      labels:['institute','college','institute name']},
    {key:'email',          labels:['email','email id','email address']},
    {key:'mobile',         labels:['mobile','phone','mobile number','contact']},
    {key:'title',          labels:['patent title','title','invention title']},
    {key:'type',           labels:['patent type','type']},
    {key:'domain',         labels:['domain','patent domain','field']},
    {key:'status',         labels:['status','current status']},
    {key:'applicationNumber', labels:['application number','app no','application no']},
    {key:'filingDate',     labels:['filing date','filed date','date of filing']},
    {key:'country',        labels:['country']},
    {key:'grantNumber',    labels:['grant number','grant no']},
    {key:'grantDate',      labels:['grant date','date of grant']},
    {key:'publicationDate',labels:['publication date','published date']},
  ];
  const COPYRIGHT_FIELDS = [
    {key:'diaryNumber',    labels:['diary number','diary no','diary']},
    {key:'rocNumber',      labels:['roc no','roc number','roc']},
    {key:'filingDate',     labels:['filing date','filed date','date of filing']},
    {key:'academicYear',   labels:['academic year']},
    {key:'calendarYear',   labels:['calendar year','year']},
    {key:'title',          labels:['title','title of work','work title']},
    {key:'classOfWork',    labels:['class of work','class','work type','category']},
    {key:'author',         labels:['author','faculty name','author/faculty name','faculty']},
    {key:'department',     labels:['department','dept']},
    {key:'status',         labels:['status']},
    {key:'registrationNumber', labels:['registration number','reg no','reg number']},
    {key:'registrationDate',   labels:['registration date','reg date']},
  ];
  const fields = kind === 'patent' ? PATENT_FIELDS : COPYRIGHT_FIELDS;
  const map = {};
  fields.forEach(f => {
    const idx = headers.findIndex(h => f.labels.includes(h.toLowerCase()));
    map[f.key] = idx >= 0 ? idx : -1;
  });
  return map;
}

function renderImportPreview(){
  const area = document.getElementById('imp-preview-area');
  if(!area) return;
  if(!importState.rows.length){ area.innerHTML=''; return; }

  const kind = importState.kind;
  const fields = kind === 'patent'
    ? [{key:'facultyName',label:'Faculty Name'},{key:'title',label:'Patent Title'},{key:'type',label:'Type'},{key:'domain',label:'Domain'},{key:'status',label:'Status'},{key:'applicationNumber',label:'App No.'},{key:'filingDate',label:'Filing Date'}]
    : [{key:'diaryNumber',label:'Diary No.'},{key:'title',label:'Title of Work'},{key:'classOfWork',label:'Class'},{key:'author',label:'Author'},{key:'department',label:'Department'},{key:'status',label:'Status'},{key:'filingDate',label:'Filing Date'}];

  const getCell = (row, key) => {
    const idx = importState.mapping[key];
    if(idx < 0 || idx === undefined) return '<span style="color:#bbb">—</span>';
    const val = row[idx];
    if(val instanceof Date) return val.toISOString().slice(0,10);
    return esc(String(val ?? '').trim());
  };

  const previewRows = importState.rows.slice(0, 50).map((row, i) => `
    <tr>
      <td class="muted" style="font-size:12px;">${i+1}</td>
      ${fields.map(f => `<td>${getCell(row, f.key)}</td>`).join('')}
    </tr>`).join('');

  const unmapped = Object.entries(importState.mapping).filter(([,v])=>v===-1).map(([k])=>k);
  const warnHtml = unmapped.length
    ? `<div style="padding:10px 22px 0 22px;font-family:'Segoe UI',sans-serif;font-size:12.5px;color:var(--amber);">⚠️ Could not auto-map columns: <b>${unmapped.join(', ')}</b>. These fields will be empty. You can still import — edit records afterwards if needed.</div>`
    : `<div style="padding:10px 22px 0 22px;font-family:'Segoe UI',sans-serif;font-size:12.5px;color:var(--green);">✓ All columns mapped successfully.</div>`;

  area.innerHTML = `
    <div class="panel" style="margin-bottom:22px;">
      <div class="panel-head">
        <h3>Step 3 — Preview <span style="font-weight:400;color:var(--text-gray);font-size:14px;">(${importState.rows.length} rows${importState.rows.length>50?' · showing first 50':''})</span></h3>
        <button class="btn btn-outline" onclick="setImportKind('${kind}')">✕ Clear</button>
      </div>
      ${warnHtml}
      <div style="overflow-x:auto;">
        <table>
          <thead><tr><th>#</th>${fields.map(f=>`<th>${f.label}</th>`).join('')}</tr></thead>
          <tbody>${previewRows}</tbody>
        </table>
      </div>
    </div>

    <div class="panel" style="margin-bottom:32px;">
      <div class="panel-head"><h3>Step 4 — Import to Google Sheets</h3></div>
      <div style="padding:16px 22px 20px 22px; font-family:'Segoe UI',sans-serif; font-size:14px; color:var(--text-gray);">
        This will save <strong style="color:var(--text-dark);">${importState.rows.length} ${kind} record${importState.rows.length===1?'':'s'}</strong> to Google Sheets. Existing records will not be overwritten — all rows are added as new entries.
      </div>
      <div style="padding:0 22px 22px 22px;">
        <button class="btn btn-navy" id="imp-submit-btn" onclick="runImport()">📥 Import ${importState.rows.length} Records to Google Sheets</button>
        <span id="imp-progress" style="font-family:'Segoe UI',sans-serif;font-size:13px;color:var(--text-gray);margin-left:14px;"></span>
      </div>
    </div>
  `;
}

async function runImport(){
  if(importState.importing) return;
  importState.importing = true;
  const btn = document.getElementById('imp-submit-btn');
  const prog = document.getElementById('imp-progress');
  if(btn) btn.disabled = true;

  const kind = importState.kind;
  const rows = importState.rows;
  let saved = 0, failed = 0;

  const getVal = (row, key) => {
    const idx = importState.mapping[key];
    if(idx < 0 || idx === undefined) return '';
    const val = row[idx];
    if(val instanceof Date) return val.toISOString().slice(0,10);
    return String(val ?? '').trim();
  };

  for(let i = 0; i < rows.length; i++){
    const row = rows[i];
    if(prog) prog.textContent = `Saving ${i+1} of ${rows.length}…`;

    try{
      let record;
      if(kind === 'patent'){
        record = {
          id: uid(), createdAt: Date.now(),
          facultyName: getVal(row,'facultyName'),
          designation: getVal(row,'designation'),
          department: getVal(row,'department'),
          institute: getVal(row,'institute'),
          email: getVal(row,'email'),
          mobile: getVal(row,'mobile'),
          title: getVal(row,'title'),
          type: getVal(row,'type'),
          domain: getVal(row,'domain'),
          status: getVal(row,'status'),
          applicationNumber: getVal(row,'applicationNumber'),
          filingDate: getVal(row,'filingDate'),
          country: getVal(row,'country') || 'India',
          grantNumber: getVal(row,'grantNumber'),
          grantDate: getVal(row,'grantDate'),
          publicationDate: getVal(row,'publicationDate'),
          designCRN:'', academicSession:'', pocStatus:'', commercialPotential:'', seedGrantRef:'',
          inventors:[], applicants:[], documents:[]
        };
        await savePatent(record);
      } else {
        record = {
          id: uid(), createdAt: Date.now(),
          diaryNumber: getVal(row,'diaryNumber'),
          rocNumber: getVal(row,'rocNumber'),
          filingDate: getVal(row,'filingDate'),
          academicYear: getVal(row,'academicYear'),
          calendarYear: getVal(row,'calendarYear'),
          title: getVal(row,'title'),
          classOfWork: getVal(row,'classOfWork'),
          author: getVal(row,'author'),
          department: getVal(row,'department'),
          status: getVal(row,'status'),
          registrationNumber: getVal(row,'registrationNumber'),
          registrationDate: getVal(row,'registrationDate'),
          isbnNumber:'', commModel:'', coAuthors:[], certificate:null
        };
        await saveCopyright(record);
      }
      saved++;
    } catch(err){
      console.error(`Row ${i+1} failed:`, err);
      failed++;
    }
  }

  importState.importing = false;
  await loadAll();

  if(prog) prog.textContent = '';
  if(failed === 0){
    toast(`✓ Successfully imported ${saved} record${saved===1?'':'s'} to Google Sheets.`);
  } else {
    toast(`Imported ${saved} records. ${failed} failed — check console for details.`, true);
  }

  // Return to dashboard for the imported type
  state.tab = kind === 'patent' ? 'patents' : 'copyright';
  state.view = 'dashboard';
  importState = { kind: null, rows: [], headers: [], mapping: {}, errors: [], importing: false };
  document.getElementById('tab-patents').classList.toggle('active', kind==='patent');
  document.getElementById('tab-copyright').classList.toggle('active', kind==='copyright');
  document.getElementById('tab-import').classList.toggle('active', false);
  render();
}


(async function init(){
  await loadAll();
  render();
})();
</script>
</body>
</html>
